<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Logo Detector</title>
  <style>
    /* ── Reset y variables ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #4f8ef7;
      --accent2:  #34d399;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --danger:   #f87171;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
      transition: background 0.3s;
    }
    .status-dot.ok  { background: var(--accent2); }
    .status-dot.err { background: var(--danger); }

    /* ── Layout principal ──────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    /* ── Columna izquierda: video + logos ──────────────────────────────────── */
    .left-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }

    .video-wrap {
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
    }

    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Panel de logos detectados */
    .detections-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .logos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 36px;
    }

    .logo-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .no-logos {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
    }

    /* ── Columna derecha: chat ─────────────────────────────────────────────── */
    .right-col {
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header span {
      font-size: 13px;
      font-weight: 600;
    }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

    /* Mensajes */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 90%;
      padding: 10px 13px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 13px;
      word-break: break-word;
    }

    .msg.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }

    .msg.bot {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }

    .msg.bot .context-tag {
      display: inline-block;
      font-size: 10px;
      color: var(--accent2);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .msg.error {
      background: rgba(248,113,113,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      align-self: flex-start;
    }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      align-self: flex-start;
    }
    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* Input de chat */
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 8px 12px;
      resize: none;
      height: 60px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input textarea:focus { border-color: var(--accent); }
    .chat-input textarea::placeholder { color: var(--muted); }

    .btn-send {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.2s;
      align-self: stretch;
    }
    .btn-send:hover   { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Botón de micrófono ────────────────────────────────────────────────── */
    .btn-mic {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 18px;
      cursor: pointer;
      align-self: stretch;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-mic:hover    { border-color: var(--accent2); color: var(--accent2); }
    .btn-mic.recording {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(248,113,113,0.08);
      animation: pulse-mic 1s infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── Estado del micrófono ──────────────────────────────────────────────── */
    .mic-status {
      font-size: 11px;
      color: var(--muted);
      padding: 0 12px 4px;
      height: 16px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .mic-status.listening { color: var(--danger); }
    .mic-status.processing { color: var(--accent); }

    /* ── Botón speaker por mensaje ────────────────────────────────────────── */
    .msg-speak {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .msg-speak:hover   { border-color: var(--accent2); color: var(--accent2); }
    .msg-speak.playing { border-color: var(--accent2); color: var(--accent2);
                         animation: pulse-mic 1s infinite; }

    /* ── Botón silenciar TTS ──────────────────────────────────────────────── */
    .btn-mute {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-mute:hover       { border-color: var(--accent); color: var(--accent); }
    .btn-mute.muted       { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <h1>DevOps Logo Detector</h1>
  <span class="badge">YOLOv8</span>
  <div class="status-dot" id="statusDot" title="Estado del detector"></div>
</header>

<!-- ── Layout ─────────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Columna izquierda: video + logos -->
  <div class="left-col">

    <!-- Stream de video -->
    <div class="video-wrap">
      <img
        src="http://localhost:8000/stream"
        alt="Stream de la cámara"
        onerror="this.style.opacity='0.3'"
      />
    </div>

    <!-- Panel de logos detectados -->
    <div class="detections-panel">
      <div class="panel-title">Logos detectados en pantalla</div>
      <div class="logos-grid" id="logosGrid">
        <span class="no-logos">Esperando detecciones...</span>
      </div>
    </div>

  </div>

  <!-- Columna derecha: chat -->
  <div class="right-col">

    <div class="chat-header">
      <span>Asistente DevOps</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn-mute" id="btnMute" title="Silenciar voz del asistente">🔊 Voz</button>
        <button class="btn-clear" id="btnClear">Limpiar chat</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg bot">
        ¡Hola! Soy tu asistente DevOps. Apunta la cámara a un logo y pregúntame lo que quieras sobre él.
      </div>
    </div>

    <div class="mic-status" id="micStatus"></div>
    <div class="chat-input">
      <textarea
        id="userInput"
        placeholder="Pregunta sobre los logos detectados o escribe... (🎤 para hablar)"
        rows="2"
      ></textarea>
      <button class="btn-mic"  id="btnMic"  title="Hablar">🎤</button>
      <button class="btn-send" id="btnSend">➤</button>
    </div>

  </div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────────────────────── -->
<script>
  const DETECTOR = '';   // proxy via chatbot
  const CHATBOT  = '';   // mismo origen (puerto 8001)

  // ── Estado ──────────────────────────────────────────────────────────────────
  let currentLogos = [];

  // ── Actualizar panel de logos (polling cada 1.5 s) ───────────────────────
  async function fetchDetections() {
    try {
      const res  = await fetch('/detections-proxy');
      const data = await res.json();

      currentLogos = data.logos || [];

      const grid = document.getElementById('logosGrid');
      document.getElementById('statusDot').className =
        'status-dot ' + (data.model_ready ? 'ok' : 'err');

      if (currentLogos.length === 0) {
        grid.innerHTML = '<span class="no-logos">Sin logos detectados</span>';
      } else {
        grid.innerHTML = currentLogos
          .map(l => `<div class="logo-chip">● ${l}</div>`)
          .join('');
      }
    } catch {
      document.getElementById('statusDot').className = 'status-dot err';
    }
  }

  setInterval(fetchDetections, 1500);
  fetchDetections();

  // ── Texto a voz (TTS) ────────────────────────────────────────────────────
  const btnMute   = document.getElementById('btnMute');
  let ttsEnabled  = true;       // activo por defecto
  let currentAudio = null;      // instancia Audio en curso

  btnMute.addEventListener('click', () => {
    ttsEnabled = !ttsEnabled;
    btnMute.textContent = ttsEnabled ? '🔊 Voz' : '🔇 Voz';
    btnMute.classList.toggle('muted', !ttsEnabled);
    btnMute.title = ttsEnabled
      ? 'Silenciar voz del asistente'
      : 'Activar voz del asistente';
    // Detener audio en curso si se silencia
    if (!ttsEnabled && currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
  });

  async function speakText(text) {
    if (!ttsEnabled || !text.trim()) return;

    // Detener audio anterior si aún suena
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }

    try {
      const res = await fetch('/speak', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text }),
      });
      if (!res.ok) return;

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.onended = () => {
        URL.revokeObjectURL(url);
        currentAudio = null;
      };
      currentAudio.play();
    } catch {
      // Fallo silencioso — el chat sigue funcionando sin voz
    }
  }

  // ── Chat ─────────────────────────────────────────────────────────────────
  const messages  = document.getElementById('messages');
  const userInput = document.getElementById('userInput');
  const btnSend   = document.getElementById('btnSend');

  function addMsg(role, text, contextLogos) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'bot' && contextLogos && contextLogos.length > 0) {
      div.innerHTML =
        `<div class="context-tag">Contexto: ${contextLogos.join(', ')}</div>` +
        escapeHtml(text);
    } else {
      div.textContent = text;
    }

    // Botón 🔊 individual en cada mensaje del bot
    if (role === 'bot') {
      const btnSpeak = document.createElement('button');
      btnSpeak.className   = 'msg-speak';
      btnSpeak.title       = 'Escuchar este mensaje';
      btnSpeak.innerHTML   = '🔊 Escuchar';

      let speakAudio = null;

      btnSpeak.addEventListener('click', async () => {
        // Si ya está sonando este mensaje, lo detiene
        if (speakAudio && !speakAudio.paused) {
          speakAudio.pause();
          speakAudio = null;
          btnSpeak.classList.remove('playing');
          btnSpeak.innerHTML = '🔊 Escuchar';
          return;
        }

        // Detener cualquier audio global en curso
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }

        btnSpeak.classList.add('playing');
        btnSpeak.innerHTML = '⏹ Detener';

        try {
          const res  = await fetch('/speak', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ text }),
          });
          if (!res.ok) throw new Error();

          const blob = await res.blob();
          const url  = URL.createObjectURL(blob);
          speakAudio = new Audio(url);
          speakAudio.onended = () => {
            URL.revokeObjectURL(url);
            speakAudio = null;
            btnSpeak.classList.remove('playing');
            btnSpeak.innerHTML = '🔊 Escuchar';
          };
          speakAudio.play();
        } catch {
          btnSpeak.classList.remove('playing');
          btnSpeak.innerHTML = '🔊 Escuchar';
        }
      });

      div.appendChild(document.createElement('br'));
      div.appendChild(btnSpeak);
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value  = '';
    btnSend.disabled = true;

    addMsg('user', text);
    const typing = addTyping();

    try {
      const res  = await fetch(`${CHATBOT}/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await res.json();

      typing.remove();

      if (data.error) {
        const err = document.createElement('div');
        err.className = 'msg error';
        err.textContent = data.response;
        messages.appendChild(err);
      } else {
        addMsg('bot', data.response, data.context_logos);
        speakText(data.response);   // ← TTS automático
      }
    } catch (e) {
      typing.remove();
      const err = document.createElement('div');
      err.className = 'msg error';
      err.textContent = 'Error de conexión con el chatbot.';
      messages.appendChild(err);
    }

    messages.scrollTop  = messages.scrollHeight;
    btnSend.disabled = false;
    userInput.focus();
  }

  // ── Micrófono — MediaRecorder + Groq Whisper ────────────────────────────
  //   Funciona en Brave, Firefox y Chrome sin depender de Google Speech API
  // ────────────────────────────────────────────────────────────────────────
  const btnMic   = document.getElementById('btnMic');
  const micLabel = document.getElementById('micStatus');
  let mediaRecorder  = null;
  let audioChunks    = [];
  let isRecording    = false;
  let micStream      = null;

  // Elige el mimetype que soporte el navegador actual
  function getBestMimeType() {
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/ogg;codecs=opus',
      'audio/ogg',
      'audio/mp4',
    ];
    return candidates.find(t => MediaRecorder.isTypeSupported(t)) || '';
  }

  function setMicLabel(text, cls = '') {
    micLabel.textContent  = text;
    micLabel.className    = 'mic-status ' + cls;
  }

  function showMicError(msg) {
    const errDiv = document.createElement('div');
    errDiv.className  = 'msg error';
    errDiv.textContent = '🎤 ' + msg;
    messages.appendChild(errDiv);
    messages.scrollTop = messages.scrollHeight;
  }

  async function stopRecordingAndTranscribe() {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

    // Detener grabación → dispara el evento 'stop'
    mediaRecorder.stop();
    micStream.getTracks().forEach(t => t.stop());
    isRecording = false;
    btnMic.classList.remove('recording');
    btnMic.title = 'Hablar';
    setMicLabel('Procesando...', 'processing');
  }

  async function startRecording() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      const msgs = {
        NotAllowedError:  'Permiso de micrófono denegado. Habilítalo en la configuración del navegador.',
        NotFoundError:    'No se encontró micrófono. ¿Está conectado?',
        NotReadableError: 'El micrófono está siendo usado por otra aplicación.',
      };
      showMicError(msgs[err.name] || 'No se pudo acceder al micrófono: ' + err.message);
      return;
    }

    audioChunks = [];
    const mimeType = getBestMimeType();
    mediaRecorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});

    mediaRecorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      if (audioChunks.length === 0) {
        setMicLabel('');
        showMicError('No se capturó audio. Intenta de nuevo.');
        return;
      }

      const mime  = mediaRecorder.mimeType || 'audio/webm';
      const ext   = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
      const blob  = new Blob(audioChunks, { type: mime });

      // Enviar al backend (mismo origen)
      const formData = new FormData();
      formData.append('audio', blob, `recording.${ext}`);

      try {
        const res  = await fetch('/transcribe', { method: 'POST', body: formData });
        const data = await res.json();
        setMicLabel('');

        if (!res.ok) {
          showMicError(data.detail || 'Error en la transcripción.');
          return;
        }

        const text = (data.transcript || '').trim();
        if (!text) {
          showMicError('No se detectó voz clara. Intenta hablar más cerca del micrófono.');
          return;
        }

        userInput.value = text;
        setTimeout(() => sendMessage(), 200);

      } catch (e) {
        setMicLabel('');
        showMicError('Error de conexión con el servidor de transcripción.');
      }
    };

    mediaRecorder.start(250);  // chunk cada 250 ms para mayor fiabilidad
    isRecording = true;
    btnMic.classList.add('recording');
    btnMic.title = 'Grabando... (clic para detener)';
    setMicLabel('🔴 Escuchando — clic en 🎤 para terminar', 'listening');
  }

  // Verificar soporte de MediaRecorder
  if (!window.MediaRecorder || !navigator.mediaDevices) {
    btnMic.title         = 'Tu navegador no soporta grabación de audio';
    btnMic.style.opacity = '0.3';
    btnMic.style.cursor  = 'not-allowed';
  } else {
    btnMic.addEventListener('click', () => {
      if (isRecording) {
        stopRecordingAndTranscribe();
      } else {
        startRecording();
      }
    });
  }


  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  btnSend.addEventListener('click', sendMessage);

  // Limpiar historial
  document.getElementById('btnClear').addEventListener('click', async () => {
    await fetch(`${CHATBOT}/clear`, { method: 'POST' });
    messages.innerHTML =
      '<div class="msg bot">Conversación reiniciada. ¿En qué puedo ayudarte?</div>';
  });
</script>

</body>
</html>
