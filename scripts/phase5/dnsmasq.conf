# dnsmasq.conf
# Servidor DHCP para las 3 VLANs del proyecto — Fase 5
#
# Este archivo es referencia. El setup_network.sh arranca dnsmasq
# con parámetros por CLI por cada interfaz/VLAN.
#
# Para arrancarlo manualmente si es necesario:
#   sudo dnsmasq --conf-file=scripts/phase5/dnsmasq.conf

# ── General ───────────────────────────────────────────────────────────────────

domain-needed
bogus-priv
no-resolv
no-poll

# DNS upstream
server=8.8.8.8
server=1.1.1.1

# Log de asignaciones DHCP
log-dhcp
log-facility=/tmp/dnsmasq-phase5.log

# ── VLAN 10 — VIDEO (10.10.10.0/24) ──────────────────────────────────────────

interface=br-vlan10
dhcp-range=interface:br-vlan10,10.10.10.100,10.10.10.200,255.255.255.0,24h

# Gateway = c3660 fa0/0
dhcp-option=interface:br-vlan10,3,10.10.10.1
dhcp-option=interface:br-vlan10,6,8.8.8.8

# Asignaciones estáticas
dhcp-host=detector,10.10.10.10
dhcp-host=chatbot,10.10.10.11

# Dominio local de la VLAN
domain=video.lab,10.10.10.0/24,local

# ── VLAN 20 — DATOS (10.20.20.0/24) ──────────────────────────────────────────

interface=br-vlan20
dhcp-range=interface:br-vlan20,10.20.20.100,10.20.20.200,255.255.255.0,24h

# Gateway = c3660 fa1/0
dhcp-option=interface:br-vlan20,3,10.20.20.1
dhcp-option=interface:br-vlan20,6,8.8.8.8

# Minikube (IP estática por ruta, no por DHCP)
# dhcp-host=minikube,10.20.20.10

domain=datos.lab,10.20.20.0/24,local

# ── VLAN 30 — MGMT (10.30.30.0/24) ──────────────────────────────────────────

interface=br-vlan30
dhcp-range=interface:br-vlan30,10.30.30.100,10.30.30.200,255.255.255.0,24h

# Gateway = c3660 fa2/0
dhcp-option=interface:br-vlan30,3,10.30.30.1
dhcp-option=interface:br-vlan30,6,8.8.8.8

# Asignaciones estáticas de servicios de monitoreo
dhcp-host=grafana,10.30.30.10
dhcp-host=prometheus,10.30.30.11
dhcp-host=cadvisor,10.30.30.12
dhcp-host=node-exporter,10.30.30.13
dhcp-host=yolo-exporter,10.30.30.14

domain=mgmt.lab,10.30.30.0/24,local

# ── DNS local del proyecto ────────────────────────────────────────────────────

# Resolución de nombres por VLAN
address=/detector.video.lab/10.10.10.10
address=/chatbot.video.lab/10.10.10.11
address=/grafana.mgmt.lab/10.30.30.10
address=/prometheus.mgmt.lab/10.30.30.11
address=/router.lab/10.10.10.1
