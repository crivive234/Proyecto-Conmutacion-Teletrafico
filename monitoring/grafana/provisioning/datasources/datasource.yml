# monitoring/grafana/provisioning/datasources/datasource.yml
# Grafana carga esto automáticamente al iniciar.
# Conecta Grafana con Prometheus sin configuración manual.

apiVersion: 1

datasources:
  - name:      Prometheus
    type:      prometheus
    access:    proxy
    url:       http://prometheus:9090
    isDefault: true
    editable:  false
    jsonData:
      timeInterval: "15s"
